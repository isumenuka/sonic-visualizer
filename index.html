<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Responsive viewport — prevents auto-zoom on input focus (iOS), works on all devices -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <!-- Theme color for browser chrome (Android, Samsung, etc.) -->
  <meta name="theme-color" content="#000000" />
  <!-- iOS PWA full-screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- Disable phone number detection on iOS/Android -->
  <meta name="format-detection" content="telephone=no" />
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Sonic Visualizer" />
  <link rel="manifest" href="/site.webmanifest" />
  <title>Sonic Visualizer</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
